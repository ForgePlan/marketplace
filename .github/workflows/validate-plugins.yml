name: Validate Plugins

on:
  pull_request:
    branches: [main, dev]
    paths:
      - 'plugins/**'
      - '.claude-plugin/marketplace.json'
      - '.github/workflows/**'
  push:
    branches: [main, dev]
    paths:
      - 'plugins/**'
      - '.claude-plugin/marketplace.json'
      - '.github/workflows/**'

# The validate job only reads files (JSON validation + the scripts/ci gates).
# Pin the workflow token to read-only so a compromised step cannot push, open
# issues, or edit the repo. This also silences the WF-PERMS-MISSING warning that
# scripts/ci/validate-workflow-security.js raises on a permissions-less workflow.
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate marketplace.json
        run: |
          python3 -c "import json, sys; json.load(open(sys.argv[1])); print('marketplace.json: OK')" ".claude-plugin/marketplace.json"

      - name: Validate all plugin.json files
        run: |
          errors=0
          for f in plugins/*/.claude-plugin/plugin.json; do
            if python3 -c "import json, sys; d=json.load(open(sys.argv[1])); assert 'name' in d and 'version' in d and 'description' in d" "$f" 2>/dev/null; then
              echo "OK: $f"
            else
              echo "FAIL: $f"
              errors=$((errors + 1))
            fi
          done
          [ $errors -eq 0 ] || exit 1

      - name: Check v2 optional fields
        run: |
          for f in plugins/*/.claude-plugin/plugin.json; do
            [ -f "$f" ] || continue
            plugin=$(dirname "$(dirname "$f")")
            name=$(basename "$plugin")
            category=$(python3 -c "import json,sys; print(json.load(open(sys.argv[1])).get('category',''))" "$f" 2>/dev/null || true)
            [ -z "$category" ] && echo "INFO: $name — no 'category' field (v2 schema)"
            has_components=$(python3 -c "import json,sys; d=json.load(open(sys.argv[1])); print('yes' if 'components' in d else 'no')" "$f" 2>/dev/null || true)
            [ "$has_components" = "yes" ] && echo "OK: $name — v2 components field present"
          done

      - name: Check command collisions
        run: |
          python3 << 'SCRIPT'
          import os, re
          owners = {}
          collisions = 0
          plugins_dir = 'plugins'
          for plugin in sorted(os.listdir(plugins_dir)):
              cmd_dir = os.path.join(plugins_dir, plugin, 'commands')
              if not os.path.isdir(cmd_dir):
                  continue
              for fname in sorted(os.listdir(cmd_dir)):
                  if not fname.endswith('.md'):
                      continue
                  fpath = os.path.join(cmd_dir, fname)
                  with open(fpath) as f:
                      head = ''.join(f.readline() for _ in range(5))
                  m = re.search(r'^name:\s*["\']?(.+?)["\']?\s*$', head, re.MULTILINE)
                  if m:
                      cmd_name = m.group(1).strip()
                      if cmd_name in owners:
                          print(f"WARN: Command '{cmd_name}' in '{plugin}' collides with '{owners[cmd_name]}'")
                          collisions += 1
                      else:
                          owners[cmd_name] = plugin
          if collisions:
              print(f"FAIL: {collisions} command collision(s) found")
              exit(1)
          print(f"OK: No command collisions ({len(owners)} commands checked)")
          SCRIPT

      - name: Check marketplace.json lists all plugins
        run: |
          python3 << 'SCRIPT'
          import json, os
          m = json.load(open('.claude-plugin/marketplace.json'))
          listed = {p['name'] for p in m['plugins']}
          on_disk = {d for d in os.listdir('plugins') if os.path.isdir(f'plugins/{d}')}
          missing = on_disk - listed
          if missing:
              print(f'FAIL: Plugins on disk but not in marketplace.json: {missing}')
              exit(1)
          print(f'OK: All {len(on_disk)} plugins listed in marketplace.json')
          SCRIPT

      - name: Validate hooks.json files
        run: |
          for f in plugins/*/hooks/hooks.json; do
            [ -f "$f" ] || continue
            python3 -c "import json, sys; json.load(open(sys.argv[1]))" "$f" && echo "OK: $f" || exit 1
          done
          echo "All hooks validated"

      - name: Ban prompt-type hooks
        run: |
          python3 << 'SCRIPT'
          import json, os, sys
          violations = []
          for root, _, files in os.walk('plugins'):
              for f in files:
                  if f != 'hooks.json':
                      continue
                  path = os.path.join(root, f)
                  with open(path) as fh:
                      try:
                          d = json.load(fh)
                      except json.JSONDecodeError:
                          continue
                  def scan(obj, trail):
                      if isinstance(obj, dict):
                          if obj.get('type') == 'prompt':
                              violations.append(f"{path}: {trail} uses type=prompt (BANNED)")
                          for k, v in obj.items():
                              scan(v, f"{trail}.{k}")
                      elif isinstance(obj, list):
                          for i, v in enumerate(obj):
                              scan(v, f"{trail}[{i}]")
                  scan(d, 'root')
          if violations:
              print('FAIL: prompt-type hooks are banned (non-deterministic, cause false blocks).')
              print('      Use type=command with a bash/python script that exits 0 silently when not matching.')
              print('      See CONTRIBUTING.md for details.')
              print()
              for v in violations:
                  print(f'  {v}')
              sys.exit(1)
          print('OK: No prompt-type hooks found')
          SCRIPT

      - name: Check SKILL.md frontmatter
        run: |
          set -o pipefail
          find plugins -name "SKILL.md" -print0 | while IFS= read -r -d '' f; do
            if head -1 "$f" | grep -q "^---"; then
              echo "OK: $f"
            else
              echo "FAIL: $f missing YAML frontmatter"
              exit 1
            fi
          done

      - name: Run plugin test suites (if any)
        run: |
          # Additive: run any plugins/*/tests/test-*.sh. Plugins without a tests/
          # dir are unaffected. A failing suite fails CI for the touching PR.
          errors=0
          found=0
          for t in plugins/*/tests/test-*.sh; do
            [ -f "$t" ] || continue
            found=$((found + 1))
            echo "--- Running: $t ---"
            if bash "$t"; then
              echo "OK: $t"
            else
              echo "FAIL: $t (exit $?)"
              errors=$((errors + 1))
            fi
          done
          [ "$found" -eq 0 ] && echo "No plugin test suites found (skipped)"
          [ "$errors" -eq 0 ] || exit 1

      - name: CI security + integrity gates (scripts/ci)
        run: |
          # The 5 gates are Node scripts (Node >= 18). ubuntu-latest ships Node;
          # echo the version both as a diagnostic and to fail fast if it is absent.
          node --version
          # Each gate ASSERTS against the checked-out tree and exits non-zero on a
          # violation. Run all five, collecting failures so the log shows every
          # offending gate, then fail the job if any failed.
          #
          # catalog-check is READ-ONLY (no --flags): a CI gate asserts on doc/disk
          # drift, it must NEVER auto-mutate docs. Do NOT add --write here.
          errors=0
          run_gate() {
            label="$1"; shift
            echo "--- gate: $label ---"
            if "$@"; then
              echo "OK: $label"
            else
              echo "FAIL: $label (exit $?)"
              errors=$((errors + 1))
            fi
          }
          run_gate "catalog-check (read-only)"    node scripts/ci/catalog-check.js
          run_gate "cross-ref-check"              node scripts/ci/cross-ref-check.js
          run_gate "check-unicode-safety"         node scripts/ci/check-unicode-safety.js
          run_gate "validate-no-personal-paths"   node scripts/ci/validate-no-personal-paths.js
          run_gate "validate-workflow-security"   node scripts/ci/validate-workflow-security.js
          run_gate "validate-install-manifests"   node scripts/ci/validate-install-manifests.js
          [ "$errors" -eq 0 ] || exit 1
