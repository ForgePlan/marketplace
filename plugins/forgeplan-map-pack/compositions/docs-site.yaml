# compositions/docs-site.yaml -- base archetype: documentation / static site
# Abstract type (docs sites, static-site generators). Full rationale: COMPOSITIONS-GUIDE.md.
template: "docs-site"
role: >-
  A documentation or static site: content (markdown/pages), a theme/layout that
  renders it, and build/config that ties it together.

detection:
  strong:
    - { signal: "docs/ or content/", type: "dir_exists_any_depth", path: "docs/", alt_path: "content/" }
    - { signal: "theme/ or layouts/", type: "dir_exists_any_depth", path: "theme/", alt_path: "layouts/" }
  weak:
    - { signal: "ssg config (mkdocs/docusaurus/hugo/astro)", type: "dir_exists_any_depth", path: "_config/" }
  negative:
    - { signal: "services/ (that's a backend)", type: "dir_exists_any_depth", path: "services/" }

arrangement: "stack-ttb"
canvas:
  grid: { cols: 2, rows: 2 }
  gap: { x: 88, y: 70 }
  margin: 40
  cell: { card_w: 190, card_h: 60, card_gap: 36, zpad: { top: 50, side: 24, bottom: 24 } }

composition:
  template: "docs-site"
  arrangement: "stack-ttb"
  entry_zone: "z.content"
  placements:
    - { zone: "z.content",   cell: { row: 0, col: 0 } }
    - { zone: "z.theme",     cell: { row: 0, col: 1 } }
    - { zone: "z.build",     cell: { row: 1, col: 0 } }
    - { zone: "z.decisions", cell: { row: 1, col: 1 } }
  zone_connectors:
    - { from: "z.content", to: "z.theme", label: "rendered by" }
    - { from: "z.build", to: "z.content", label: "compiles" }

default_node_home: { zone: "z.content", note: "unmatched content lands in the content zone" }

zones:
  - id: "z.content"
    label: "Content"
    sub: "the pages"
    kind: "surface"
    accent: "--map-accent-cyan"
    treatment: "neutral-dashed"
    rule_edge: "off"
    layout_rule: "grid"
    cols: 3
    capacity: 8
    overflow: "grow"
    description_ru: >-
      Сам контент: markdown-страницы и разделы. Суть сайта; всё остальное лишь
      оформляет и собирает его. Много страниц схлопывается в группы (E1a).
  - id: "z.theme"
    label: "Theme & Layout"
    sub: "how it looks"
    kind: "component"
    accent: "--map-accent-rose"
    treatment: "neutral-dashed"
    rule_edge: "off"
    layout_rule: "grid"
    cols: 2
    capacity: null
    overflow: "grow"
    description_ru: >-
      Тема и шаблоны: как контент выглядит — layout'ы, стили, навигация,
      компоненты страниц.
  - id: "z.build"
    label: "Build & Config"
    sub: "the generator"
    kind: "core"
    accent: "--map-accent-emerald"
    treatment: "neutral-dashed"
    rule_edge: "off"
    layout_rule: "grid"
    cols: 2
    capacity: null
    overflow: "grow"
    description_ru: >-
      Сборка и конфигурация: генератор статики, плагины, настройки. Превращает
      контент и тему в готовый сайт.
  - id: "z.decisions"
    label: "Decision Trail"
    sub: "why the code looks like this"
    kind: "truth"
    accent: "--map-accent-slate"
    treatment: "neutral-dashed"
    rule_edge: "off"
    layout_rule: "grid"
    cols: 4
    capacity: 8
    overflow: "grow"
    description_ru: >-
      След решений проекта: EPIC → PRD → RFC → ADR → EVID. Группируется по типу.

zone_hints:
  - { zone: "z.content", source: "code.modules", pattern: "**/docs/**" }
  - { zone: "z.content", source: "code.modules", pattern: "**/content/**" }
  - { zone: "z.theme", source: "code.modules", pattern: "**/theme/**" }
  - { zone: "z.theme", source: "code.modules", pattern: "**/layouts/**" }
  - { zone: "z.build", source: "code.entrypoints", pattern: "**" }
  - { zone: "z.build", source: "code.modules", pattern: "**/config/**" }
  - { zone: "z.build", source: "code.modules", pattern: "**/plugins/**" }
  - { zone: "z.decisions", source: "fpl.artifacts", pattern: "**" }

flow_hints:
  - id: "f.build"
    name: "Build"
    path: ["z.content", "z.theme", "z.build"]
    steps_ru:
      - "Автор пишет страницы контента."
      - "Тема задаёт, как они выглядят."
      - "Генератор собирает контент и тему в готовый статический сайт."
  - id: "f.decisions"
    name: "Decision trail"
    path: ["z.decisions"]
    steps_ru:
      - "След решений проекта: EPIC → PRD → RFC → ADR."
